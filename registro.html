<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/estilo.css">
  </head>
<body>
  <header>
    <h1 class="text-center"><img src="assets/img/Logo Alke Wallet sin fondo.png" alt="Logo" height="100px"></h1>
  </header>
  <main>
    
    
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8">

          <div id="mensaje"></div>
          <h2>Bienvenido a Alke Wallet</h2>
          <p>Antes de comenzar crea tu cuenta</p>
          <form action="">
            <div class="mb-3">
              <label for="nombre" class="form-label" >Correo electrónico</label>
              <input type="text" name="email" class="form-control" id="email" placeholder="Ingrese e-mail">
              </div>
              <div class="mb-3">                 
              <label for="nombre" class="form-label" >Nombre completo</label>
              <input type="text" name="nombre" class="form-control" id="nombre" placeholder="Ingrese su nombre">  
              </div>        
              <div class="mb-3">
              <label for="password" class="form-label" >Contraseña</label>
              <input type="password" name="contraseña" class="form-control" id="password" placeholder="Ingrese contraseña">
              </div>
              <div class="mb-3">
              <label for="confirmar_password" class="form-label" >Confirme contraseña</label>
              <input type="password" name="confirmar_password" class="form-control" id="confirmar_password" placeholder="Reingrese contraseña">
              </div>
              <div>
              <a class="btn btn-success w-100" href="login.html">Crear</a>
            </div>
          </form>
          <div class="text-center">
          <p>¿ya tienes cuenta?<a href="login.html">Iniciar sesión</a></p>
          
          </div>

      
    
  </main>


<footer>
  <p class="text-center">© Alke Wallet 2026</p>
</footer>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
