<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/estilo.css">
  </head>
<body>
  <header>
    <h1 class="text-center"><img src="assets/img/Logo Alke Wallet sin fondo.png" alt="Logo" height="100px"></h1>
  </header>
  <main>
    
    
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8">

          <div id="mensaje"></div>
          <h2>Bienvenido a Alke Wallet</h2>
          <p>Antes de comenzar crea tu cuenta</p>
          <form id="form-registro">
            <div class="mb-3">
              <label for="email" class="form-label" >Correo electrónico</label>
              <input type="email" name="email" class="form-control" id="email" placeholder="Ingrese e-mail">
            </div>
              <div class="mb-3">                 
                <label for="nombre" class="form-label" >Nombre  completo</label>
              <input type="text" name="nombre" class="form-control" id="nombre" placeholder="Ingrese su nombre">  
            </div>        
              <div class="mb-3">
              <label for="password" class="form-label" >Contraseña</label>
              <input type="password" name="contraseña" class="form-control" id="password" placeholder="Ingrese contraseña">
              </div>
              <div class="mb-3">
              <label for="confirmar_password" class="form-label" >Confirme contraseña</label>
              <input type="password" name="confirmar_password" class="form-control" id="confirmar_password" placeholder="Reingrese contraseña">
              </div>
              <div>
              <button class="btn btn-success w-100" >Crear</button>
            </div>
          </form>
          <div class="text-center">
          <p>¿ya tienes cuenta?<a href="login.html">Iniciar sesión</a></p>
          
          </div>

      
    
  </main>


<footer>
  <p class="text-center">© Alke Wallet 2026</p>
</footer>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById("form-registro").addEventListener("submit", function(event){
            event.preventDefault();

            const email = document.getElementById("email").value;
            const nombre= document.getElementById("nombre").value;
            const password= document.getElementById("password").value;
            const confirmarPassword= document.getElementById("confirmar_password").value;

            if(password !== confirmarPassword){
                document.getElementById("mensaje").innerHTML = `
                <div class="alert alert-danger alert-dismissible fade show">
                    Las contraseñas no coinciden.
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;
                return;
            }

            const nuevoUsuario = {
                email,
                nombre,
                password
            }

            let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

            usuarios.push(nuevoUsuario);

            localStorage.setItem("usuarios", JSON.stringify(usuarios));

            document.getElementById("mensaje").innerHTML = `
                <div class="alert alert-success alert-dismissible fade show">
                    Registro exitoso. Redirigiendo...
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;

            setTimeout(() => {
                window.location.href = "login.html";
            }, 3000);

        });
    </script>


</body>
</html>
