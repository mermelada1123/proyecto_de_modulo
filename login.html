<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
    <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">  
  </head>
<body>
  <header>
    <h1 class="text-center"><img src="assets/img/Logo Alke Wallet sin fondo.png" alt="Logo" height="100px"></h1>
    <div class="text-center"><a href="index.html"><i class="fa-solid fa-chevron-left"></i></a></div> 
  </header>
  <main>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 ">

          <div id="mensaje"></div>
          <h2 class="text-center">Bienvenido a Alke Wallet</h2>
          
          <form id="form-login">
            <div class="mb-3">
              <label for="email" class="form-label" >Correo electrónico</label>
              <input type="email" name="email" class="form-control" id="email" placeholder="Ingrese e-mail">
              </div>
                      
              <div class="mb-3">
              <label for="password" class="form-label" >Contraseña</label>
              <input type="password" name="contraseña" class="form-control" id="password" placeholder="Ingrese contraseña">
              </div>
              
              <div>
              <button class="btn btn-success w-100" >Ingresar</button>
            </div>
          </form>
          <div class="text-center">
          <p>¿Olvidaste tu contraseña?<a href="recovery.html">Recuperar</a></p>
          
          </div>

    
  </main>


<footer>
  <p class="text-center">© Alke Wallet 2026</p>
</footer>



    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById("form-login").addEventListener("submit", function(event){
            event.preventDefault();

            const email= document.getElementById("email").value;
            const password= document.getElementById("password").value;

            let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

            const usuarioEncontrado = usuarios.find(function (user){
                return user.email === email && user.password === password;
            });

            if (usuarioEncontrado){
                localStorage.setItem("usuarioLogueado", JSON.stringify(usuarioEncontrado));

                document.getElementById("mensaje").innerHTML = `
                <div class="alert alert-success alert-dismissible fade show">
                    Inicio de sesión exitoso.
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;
                setTimeout(() => {
                    window.location.href = "menu.html"
                }, 3000);
            } else {
                document.getElementById("mensaje").innerHTML = `
                <div class="alert alert-danger alert-dismissible fade show">
                    email y/o contraseña incorrectos.
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;

                setTimeout(() => {
                    document.getElementById("mensaje").innerHTML = "";
                }, 3000);
            }


        })
    </script>
    <script src="assets/JS/script.js"></script>
</body>
</html>
