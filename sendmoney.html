<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trasferencias</title>
    <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  </head>
<body>
  <header class="d-flex justify-content-between align-items-center">
      <a href="menu.html"><i class="fa-solid fa-chevron-left"></i></a>
    <h1 class="text-center"><img src="assets/img/Logo Alke Wallet sin fondo.png" alt="Logo" height="100px"></h1>
    <button class="btn btn-success btn-sm" id="salir"><i class="fa-solid fa-power-off"></i></button>
    
    
  </header>
  <main>
    <section class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8">
          <div class="card shadow">
            <div class="card-body">
              <h2>Destinatarios</h2><i class="fa-solid fa-user-plus"></i>            
              <p>Agrega nuevos destinatarios</p>       
              <button class="btn btn-success">Crear contacto</button>        
            </div>  
          </div>  
        </div>  
      </div>  
  
      
      <div class="row justify-content-center">
        <div class="col-12 col-md-8">
          <div class="card shadow">
            <div class="card-body">
              <h2>Realizar transferencia</h2><i class="fa-solid fa-money-bill-transfer"></i>            
              <p>Selecciona un destinatario e ingresa el monto.</p>
              <form id="form-deposit">
                <div class="mb-3">
                  <label for="monto" class="form-label" >Monto</label>
                  <input type="number" name="monto" class="form-control" id="monto" placeholder="Ej. $50.000">
                  </div>                      
                <div class="mb-3">
                  <label for="destinatario" class="form-label" >Destinatario</label>
                  <select id="destinatario" class="form-select">
                    <option selected>Seleccione un destinatario</option>
                    <option value="1">Maria la del Barrio</option>
                    <option value="2">Brad Pitt</option>
                    <option value="3">Tulio Triño</option>
                    <option value="4">Shakira</option>
                </form>
              </select>              
                </div>      
                  <button href="Deposit.html" class=" btn btn-success btn">Confirmar</button>
                </div>
              </div>
            </div>
          </div>             
    
      </section>

    </main>


    <footer>
      <p class="text-center">© Alke Wallet 2026</p>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/JS/script.js"></script>  
  </body>
</html>
