<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depositar</title>
    <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  </head>
<body>
  <header class="d-flex justify-content-between align-items-center">
      <a href="menu.html"><i class="fa-solid fa-chevron-left"></i></a>
    <h1 class="text-center"><img src="assets/img/Logo Alke Wallet sin fondo.png" alt="Logo" height="100px"></h1>
    <button class="btn btn-success btn-sm" id="salir"><i class="fa-solid fa-power-off"></i></button>
    
    
  </header>
  <main>
    <section class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8">
          <div class="card shadow">
            <div class="card-body">
              
          <div id="mensajedeposit"></div>
            <h2>Depositar</h2>
            <span></span>
            <p>Para realizar tu deposito en Alke Wallet ingresa la siguiente información</p>
          
      <form id="form-deposit">
            <div class="mb-3">
              <label for="monto" class="form-label" >Monto</label>
              <input type="number" name="monto" class="form-control" id="montodeposit" placeholder="Ej. $50.000">
              </div>
                      
              <div class="mb-3">
              <label for="banco" class="form-label" >Banco</label>
              <select id="banco" class="form-select">
                <option selected>Ingrese su banco</option>
                <option value="1">BancoEstado</option>
                <option value="2">Banco de Chile</option>
                <option value="3">Banco Itaú</option>
                <option value="4">Banco Scotiabank</option>
              
              </select>
              
              </div>

      
            <button href="Deposit.html" class=" btn btn-success btn">Confirmar</button>
            </div>
          </div>
        </div>
      </div>

      
      
    
            
    
    </section>
    
  </main>

<footer>
  <p class="text-center">© Alke Wallet 2026</p>
</footer>



    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script>
        document.getElementById("form-deposit").addEventListener("submit", function(event){
            event.preventDefault();

            const montodeposit = Number(document.getElementById("montodeposit").value);
            const banco= document.getElementById("banco").value;
            

            if(montodeposit < 5000){
                document.getElementById("mensajedeposit").innerHTML = `
                <div class="alert alert-danger alert-dismissible fade show">
                    Los depositos deben ser de al menos $5.000.
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;
                return;
            }

            const nuevoDeposito = {
                montodeposit,
                banco,
                
            }

            let depositos = JSON.parse(localStorage.getItem("depositos")) || [];

            depositos.push(nuevoDeposito);

            let saldo = Number(localStorage.getItem("saldo")) || 0;

            saldo += montodeposit;

            localStorage.setItem("saldo", saldo);

            localStorage.setItem("depositos", JSON.stringify(depositos));

            document.getElementById("mensajedeposit").innerHTML = `
                <div class="alert alert-success alert-dismissible fade show">
                    Deposito exitoso. Volviendo al menu...
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;

            setTimeout(() => {
                window.location.href = "menu.html";
            }, 3000);

        });
    </script>
    
</body>
</html>
